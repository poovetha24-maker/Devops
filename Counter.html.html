<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        #count {
            font-size: 60px;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Counter App</h1>

    <div id="count">0</div>

    <button onclick="decrease()">- Decrease</button>
    <button onclick="resetCounter()">Reset</button>
    <button onclick="increase()">+ Increase</button>

    <script>
        let count = 0;

        function updateDisplay() {
            document.getElementById("count").textContent = count;
        }

        function increase() {
            count++;
            updateDisplay();
        }

        function decrease() {
            count--;
            updateDisplay();
        }

        function resetCounter() {
            count = 0;
            updateDisplay();
        }
    </script>

</body>
</html>
